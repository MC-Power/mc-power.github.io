<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Power - Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--bg:#0b0e14;--card:#151a24;--border:#2a3345;--primary:#00ff88;--danger:#ff4444;--gold:#ffd700;--text:#e0e6ed;--muted:#8892a6}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
        header{background:var(--card);padding:1rem 2rem;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .logo{font-size:1.5rem;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:2px}
        .btn{background:transparent;border:2px solid var(--border);color:var(--text);padding:0.5rem 1.25rem;cursor:pointer;border-radius:6px;font-weight:600;transition:0.3s;margin-left:0.5rem}
        .btn:hover{transform:translateY(-2px)}
        .btn-primary{background:var(--primary);color:#000;border-color:var(--primary)}
        .btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
        .container{max-width:1200px;margin:0 auto;padding:2rem}
        .status{padding:0.5rem 1rem;border-radius:6px;margin-bottom:1rem;display:inline-block;font-weight:600}
        .status.connecting{background:rgba(255,165,0,0.2);color:orange}
        .status.connected{background:rgba(0,255,136,0.2);color:var(--primary)}
        .status.error{background:rgba(255,68,68,0.2);color:var(--danger)}
        .gate{text-align:center;padding:4rem 2rem;background:var(--card);border-radius:12px;border:2px solid var(--border);margin-top:2rem}
        .gate h2{margin-bottom:1rem;color:var(--primary)}
        .table-box{background:var(--card);border-radius:10px;overflow:hidden;border:2px solid var(--border);margin-top:2rem;display:none}
        table{width:100%;border-collapse:collapse}
        th{background:#1a2233;color:var(--primary);padding:1rem;text-align:left;text-transform:uppercase;font-size:0.8rem}
        td{padding:1rem;border-bottom:1px solid var(--border)}
        tr:hover{background:#1f2738}
        .rank{display:inline-flex;align-items:center;justify-content:center;width:35px;height:35px;border-radius:6px;font-weight:700}
        .r1{background:gold;color:#000}.r2{background:silver;color:#000}.r3{background:#cd7f32;color:#000}.rother{background:var(--border)}
        .tier{padding:4px 10px;border-radius:5px;font-weight:700;font-size:0.85rem;border:2px solid;display:inline-block;min-width:60px;text-align:center}
        .hp{background:rgba(0,255,136,0.2);color:var(--primary);border-color:var(--primary)}
        .lp{background:rgba(255,68,68,0.2);color:var(--danger);border-color:var(--danger)}
        .hp1{background:gold;color:#000;border-color:gold;box-shadow:0 0 10px gold}
        .role{font-size:0.75rem;padding:2px 8px;border-radius:4px;text-transform:uppercase;font-weight:700}
        .role-owner{background:gold;color:#000}.role-admin{background:#6366f1;color:#fff}.role-tester{background:#10b981;color:#fff}.role-player{background:var(--border);color:var(--muted)}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);align-items:center;justify-content:center;z-index:1000}
        .modal.show{display:flex}
        .modal-box{background:var(--card);padding:2rem;border-radius:12px;width:90%;max-width:450px;border:2px solid var(--border)}
        .modal-box h3{text-align:center;margin-bottom:1.5rem;color:var(--primary)}
        .form-group{margin-bottom:1rem}
        .form-group label{display:block;margin-bottom:0.5rem;color:var(--muted);font-size:0.9rem}
        .form-input{width:100%;padding:0.8rem;background:var(--bg);border:2px solid var(--border);color:var(--text);border-radius:6px}
        .form-input:focus{outline:none;border-color:var(--primary)}
        .msg{padding:0.8rem;border-radius:6px;margin-bottom:1rem;display:none;font-weight:600}
        .msg.show{display:block}.msg.err{background:rgba(255,68,68,0.2);color:#fca5a5}.msg.ok{background:rgba(0,255,136,0.2);color:#6ee7b7}
        .toggle{text-align:center;margin-top:1rem;color:var(--muted);cursor:pointer}.toggle:hover{color:var(--primary)}
        #debug{position:fixed;bottom:0;left:0;right:0;background:#000;color:#0f0;font-family:monospace;font-size:12px;padding:10px;max-height:150px;overflow-y:auto;display:none;z-index:2000;border-top:2px solid var(--primary)}
        #debug.show{display:block}
        #toggleDebug{position:fixed;bottom:10px;right:10px;background:var(--card);border:2px solid var(--border);color:var(--muted);padding:6px 10px;cursor:pointer;border-radius:6px;z-index:2001;font-size:11px}
        .loading{text-align:center;padding:2rem;color:var(--muted)}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <header>
        <div class="logo">⚔️ MC POWER</div>
        <div>
            <button id="btnLogin" class="btn btn-primary">Anmelden</button>
            <button id="btnLogout" class="btn btn-danger hidden">Abmelden</button>
        </div>
    </header>
    <div class="container">
        <div id="connStatus" class="status connecting">Verbinde...</div>
        
        <div id="authGate" class="gate">
            <h2>🔒 Zugang geschützt</h2>
            <p style="color:var(--muted);margin-bottom:1.5rem">Melde dich an oder registriere dich, um das Leaderboard zu sehen.</p>
            <button class="btn btn-primary" onclick="openAuth()">Jetzt anmelden</button>
        </div>

        <div id="lbContainer" class="table-box">
            <h2 style="padding:1rem;border-bottom:1px solid var(--border)">🏆 Leaderboard</h2>
            <table>
                <thead><tr><th style="width:60px">Rang</th><th>Spieler</th><th>Region</th><th>Modus</th><th>Punkte</th><th>Tier</th><th>Rolle</th></tr></thead>
                <tbody id="lbBody"><tr><td colspan="7" class="loading">Lade Daten...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-box">
            <h3 id="authTitle">Anmelden</h3>
            <div id="authMsg" class="msg"></div>
            <div class="form-group"><label>Benutzername</label><input type="text" id="inpUser" class="form-input" placeholder="Dein Minecraft Name"></div>
            <div class="form-group" id="emailGroup" style="display:none"><label>E-Mail</label><input type="email" id="inpEmail" class="form-input" placeholder="deine@email.com"></div>
            <div class="form-group"><label>Passwort</label><input type="password" id="inpPass" class="form-input" placeholder="Mind. 6 Zeichen"></div>
            <button id="btnAuth" class="btn btn-primary" style="width:100%">Los</button>
            <div id="authToggle" class="toggle">Noch kein Account? Registrieren</div>
            <div class="toggle" onclick="closeAuth()">❌ Abbrechen</div>
        </div>
    </div>

    <button id="toggleDebug" onclick="toggleDebugConsole()">🐛 Debug [D]</button>
    <div id="debug"></div>

    <script>
        // ===== KONFIGURATION =====
        const SUPABASE_URL = 'https://yqgtlfbykubjizqghiat.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxZ3RsZmJ5a3Viaml6cWdoaWF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDQ0NzIsImV4cCI6MjA5MjcyMDQ3Mn0.qY9zREp-l_dpKJT1fnX6tiYKdsUwv0QNLezbUTkwTho';
        
        // ===== GLOBALE VARIABLEN =====
        let sb = null;
        let currentUser = null;
        let loginMode = true;

        // ===== DEBUG KONSOLE =====
        function toggleDebugConsole() {
            const dbg = document.getElementById('debug');
            if(dbg) dbg.classList.toggle('show');
        }
        document.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'd' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                toggleDebugConsole();
            }
        });
        function log(msg) {
            const dbg = document.getElementById('debug');
            if(dbg) {
                const time = new Date().toLocaleTimeString();
                dbg.innerHTML += `<div>[${time}] ${msg}</div>`;
                dbg.scrollTop = dbg.scrollHeight;
            }
            console.log(msg);
        }

        // ===== SUPABASE INIT =====
        async function initSupabase() {
            log('🔄 Supabase wird initialisiert...');
            try {
                if(!window.supabase) throw new Error('Supabase Library nicht geladen!');
                sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                log('✅ Supabase Client erstellt');
                const { error } = await sb.from('players').select('id').limit(1);
                if(error && error.message.includes('does not exist')) {
                    throw new Error('❌ Tabellen fehlen! SQL in Supabase ausführen.');
                }
                if(error) throw error;
                log('✅ Datenbank verbunden');
                document.getElementById('connStatus').className = 'status connected';
                document.getElementById('connStatus').textContent = '🟢 Verbunden';
                return true;
            } catch(err) {
                log('❌ ' + err.message);
                document.getElementById('connStatus').className = 'status error';
                document.getElementById('connStatus').textContent = '🔴 Fehler';
                return false;
            }
        }

        // ===== AUTH UI =====
        function openAuth() { 
            document.getElementById('authModal').classList.add('show'); 
            document.getElementById('authMsg').className = 'msg';
            document.getElementById('inpUser').focus();
            log('🔐 Login Modal geöffnet');
        }
        function closeAuth() { 
            document.getElementById('authModal').classList.remove('show'); 
            log('🔐 Login Modal geschlossen');
        }
        function toggleAuthMode() {
            loginMode = !loginMode;
            document.getElementById('authTitle').textContent = loginMode ? 'Anmelden' : 'Registrieren';
            document.getElementById('btnAuth').textContent = loginMode ? 'Einloggen' : 'Registrieren';
            document.getElementById('authToggle').textContent = loginMode ? 'Noch kein Account? Registrieren' : 'Bereits Account? Einloggen';
            document.getElementById('authMsg').className = 'msg';
            
            // E-Mail Feld nur bei Registrierung anzeigen
            const emailGroup = document.getElementById('emailGroup');
            if(emailGroup) {
                emailGroup.style.display = loginMode ? 'none' : 'block';
            }
            
            log('🔄 Modus: ' + (loginMode ? 'LOGIN' : 'REGISTER'));
        }
        function showAuthMsg(txt, ok) {
            const el = document.getElementById('authMsg');
            el.textContent = txt;
            el.className = 'msg show ' + (ok ? 'ok' : 'err');
        }

        // ===== AUTH LOGIK =====
        async function handleAuth() {
            const u = document.getElementById('inpUser').value.trim();
            const p = document.getElementById('inpPass').value;
            const emailInput = document.getElementById('inpEmail') ? document.getElementById('inpEmail').value.trim() : '';
            
            if(!u || !p) return showAuthMsg('❌ Bitte Name und Passwort eingeben', false);
            if(!loginMode && p.length < 6) return showAuthMsg('❌ Passwort muss mind. 6 Zeichen haben', false);
            
            // Bei Registrierung: E-Mail erforderlich
            if(!loginMode) {
                if(!emailInput || !emailInput.includes('@')) {
                    return showAuthMsg('❌ Bitte gültige E-Mail eingeben', false);
                }
            }
            
            const btn = document.getElementById('btnAuth');
            btn.disabled = true;
            btn.textContent = loginMode ? 'Prüfe...' : 'Erstelle...';
            
            try {
                if(loginMode) {
                    // LOGIN: Benutzername@fake-domain
                    const email = u.toLowerCase() + '@mcpower.local';
                    log('🔑 Login: ' + u);
                    
                    const { data, error } = await sb.auth.signInWithPassword({ email, password: p });
                    if(error) throw error;
                    if(!data?.user) throw new Error('Ungültige Serverantwort');
                    
                    currentUser = data.user;
                    log('✅ Login erfolgreich');
                    showAuthMsg('✅ Erfolgreich!', true);
                    setTimeout(closeAuth, 800);
                    applyAuthState();
                    await loadLeaderboard();
                } else {
                    // REGISTER: Echte E-Mail verwenden
                    log('📝 Register: ' + u + ' mit E-Mail: ' + emailInput);
                    
                    const { data, error } = await sb.auth.signUp({ 
                        email: emailInput, 
                        password: p,
                        options: {
                            data: {
                                username: u,
                                display_name: u
                            }
                        }
                    });
                    
                    if(error) throw error;
                    if(!data?.user) throw new Error('Registrierung fehlgeschlagen');
                    
                    // Profil in players Tabelle anlegen
                    const { error: dbError } = await sb.from('players').insert([{
                        user_id: data.user.id,
                        username: u,
                        display_name: u,
                        role: 'player',
                        region: 'DE'
                    }]);
                    
                    if(dbError) log('⚠️ DB-Eintrag: ' + dbError.message);
                    
                    log('✅ Account erstellt');
                    showAuthMsg('✅ Account erstellt! Bitte einloggen.', true);
                    loginMode = true;
                    toggleAuthMode();
                }
            } catch(err) {
                log('❌ Auth Fehler: ' + err.message);
                showAuthMsg('❌ ' + err.message, false);
            } finally {
                btn.disabled = false;
                btn.textContent = loginMode ? 'Einloggen' : 'Registrieren';
            }
        }

        async function checkSession() {
            log('🔍 Prüfe Session...');
            try {
                const {  { session } } = await sb.auth.getSession();
                if(session?.user) {
                    currentUser = session.user;
                    log('✅ Session gefunden');
                    applyAuthState();
                    await loadLeaderboard();
                } else {
                    log('ℹ️ Keine Session');
                    applyAuthState();
                }
            } catch(err) {
                log('⚠️ Session-Check: ' + err.message);
                applyAuthState();
            }
        }

        function applyAuthState() {
            if(currentUser) {
                document.getElementById('btnLogin').classList.add('hidden');
                document.getElementById('btnLogout').classList.remove('hidden');
                document.getElementById('authGate').style.display = 'none';
                document.getElementById('lbContainer').style.display = 'block';
            } else {
                document.getElementById('btnLogin').classList.remove('hidden');
                document.getElementById('btnLogout').classList.add('hidden');
                document.getElementById('authGate').style.display = 'block';
                document.getElementById('lbContainer').style.display = 'none';
            }
        }

        async function doLogout() {
            log('🚪 Logout...');
            await sb.auth.signOut();
            currentUser = null;
            applyAuthState();
            document.getElementById('lbBody').innerHTML = '<tr><td colspan="7" class="loading">Bitte anmelden</td></tr>';
        }

        // ===== LEADERBOARD =====
        async function loadLeaderboard() {
            if(!currentUser) { log('⛔ LB Blockiert: Nicht eingeloggt'); return; }
            log('📊 Lade Leaderboard...');
            const tb = document.getElementById('lbBody');
            tb.innerHTML = '<tr><td colspan="7" class="loading">Lade...</td></tr>';
            
            try {
                const { data, error } = await sb.from('leaderboard')
                    .select('*, players(username, display_name, region, role, is_banned)')
                    .order('points', { ascending: false })
                    .limit(100);
                
                if(error) throw error;
                tb.innerHTML = '';
                if(!data || data.length === 0) {
                    tb.innerHTML = '<tr><td colspan="7" class="loading">Keine Spieler eingetragen</td></tr>';
                    return;
                }
                
                const map = new Map();
                data.forEach(r => {
                    const p = r.players;
                    if(!p || p.is_banned) return;
                    if(!map.has(p.id)) map.set(p.id, {p, entries:[]});
                    map.get(p.id).entries.push(r);
                });
                
                const sorted = Array.from(map.values()).sort((a,b) => Math.max(...b.entries.map(e=>e.points)) - Math.max(...a.entries.map(e=>e.points)));
                
                sorted.forEach((it, idx) => {
                    const p = it.p;
                    const best = it.entries.reduce((m,e) => e.points > m.points ? e : m);
                    const rc = idx < 1 ? 'r1' : idx < 2 ? 'r2' : idx < 3 ? 'r3' : 'rother';
                    const tc = best.tier.includes('HP') ? 'hp' : 'lp';
                    const tc1 = best.tier === 'HP1' ? 'hp1' : '';
                    tb.innerHTML += `<tr>
                        <td><span class="rank ${rc}">${idx+1}</span></td>
                        <td><strong>${p.display_name||p.username}</strong></td>
                        <td>${p.region||'-'}</td>
                        <td>${best.gamemode}</td>
                        <td style="color:var(--primary)">${best.points}</td>
                        <td><span class="tier ${tc} ${tc1}">${best.tier}</span></td>
                        <td><span class="role role-${p.role}">${p.role}</span></td>
                    </tr>`;
                });
                log('✅ '+sorted.length+' Spieler geladen');
            } catch(err) {
                log('❌ LB Fehler: ' + err.message);
                tb.innerHTML = '<tr><td colspan="7" class="loading" style="color:var(--danger)">Fehler: ' + err.message + '</td></tr>';
            }
        }

        // ===== EVENTS & START =====
        document.getElementById('btnLogin').onclick = openAuth;
        document.getElementById('btnLogout').onclick = doLogout;
        document.getElementById('btnAuth').onclick = handleAuth;
        document.getElementById('authToggle').onclick = toggleAuthMode;
        document.getElementById('authModal').onclick = (e) => { if(e.target.id === 'authModal') closeAuth(); };
        document.getElementById('inpUser').onkeypress = (e) => { if(e.key==='Enter') document.getElementById('inpPass').focus(); };
        document.getElementById('inpPass').onkeypress = (e) => { if(e.key==='Enter') handleAuth(); };

        window.addEventListener('load', async () => {
            log('🎮 MC Power gestartet');
            const ok = await initSupabase();
            if(ok) await checkSession();
        });
    </script>
</body>
</html>
