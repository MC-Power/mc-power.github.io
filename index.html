<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Power Leaderboard</title>
    <!-- Supabase Bibliothek laden -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* DESIGN / CSS - HIER FÄNGT DAS DESIGN AN */
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }
        
        /* Header */
        header {
            background: #1e293b;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
        }
        .logo { font-size: 24px; font-weight: bold; color: #10b981; }
        
        /* Buttons */
        button {
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-green { background: #10b981; color: #000; }
        .btn-green:hover { background: #059669; }
        .btn-red { background: #ef4444; color: white; }
        
        /* Container */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        /* Tabelle */
        .table-box {
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: #10b981; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        tr:hover { background: #334155; }
        
        /* Tiers Farben */
        .tier-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .hp { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .lp { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .hp1 { background: gold; color: black; border: 1px solid gold; box-shadow: 0 0 10px gold; }
        
        /* Login Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e293b; padding: 30px; border-radius: 10px; width: 300px;
            border: 1px solid #334155; text-align: center;
        }
        input {
            width: 100%; padding: 10px; margin-bottom: 10px; background: #0f172a;
            border: 1px solid #334155; color: white; border-radius: 5px; box-sizing: border-box;
        }
        
        /* Debug Console */
        #debug {
            position: fixed; bottom: 0; left: 0; right: 0; background: black; color: lime;
            font-family: monospace; font-size: 12px; padding: 10px; max-height: 150px; overflow-y: auto;
            display: none; z-index: 999; border-top: 2px solid lime;
        }
        .status-msg { padding: 10px; margin-bottom: 10px; border-radius: 5px; display: none; text-align: center;}
        .error { background: #ef4444; color: white; }
        .success { background: #10b981; color: black; }
    </style>
</head>
<body>

    <!-- KOPFZEILE -->
    <header>
        <div class="logo">⚔️ MC POWER</div>
        <div>
            <button id="btnLogin" class="btn-green">Anmelden</button>
            <button id="btnLogout" class="btn-red" style="display:none;">Abmelden</button>
        </div>
    </header>

    <div class="container">
        <h2 style="border-bottom: 2px solid #334155; padding-bottom: 10px;">🏆 Leaderboard</h2>
        
        <div id="msgBox" class="status-msg"></div>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>Rang</th>
                        <th>Spieler</th>
                        <th>Region</th>
                        <th>Modus</th>
                        <th>Punkte</th>
                        <th>Tier</th>
                        <th>Rolle</th>
                    </tr>
                </thead>
                <tbody id="lbBody">
                    <tr><td colspan="7" style="text-align:center; color: #64748b;">Lade Daten...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Anmelden</h3>
            <input type="text" id="username" placeholder="Benutzername">
            <input type="password" id="password" placeholder="Passwort">
            <button class="btn-green" style="width:100%" id="btnSubmit">Los</button>
            <p style="margin-top:15px; font-size: 12px; color: #94a3b8; cursor:pointer;" id="toggleMode">
                Noch keinen Account? Registrieren
            </p>
            <p style="font-size: 12px; color: #ef4444; cursor:pointer;" onclick="closeModal()">Abbrechen</p>
        </div>
    </div>

    <!-- DEBUG FENSTER (Drücke 'D' zum Öffnen) -->
    <div id="debug"></div>

    <script>
        // === KONFIGURATION ===
        const SUPABASE_URL = 'https://yqgtlfbykubjizqghiat.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxZ3RsZmJ5a3Viaml6cWdoaWF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDQ0NzIsImV4cCI6MjA5MjcyMDQ3Mn0.qY9zREp-l_dpKJT1fnX6tiYKdsUwv0QNLezbUTkwTho';
        
        // Supabase Client starten
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let isLoginMode = true;
        let currentUser = null;

        // === HILFSFUNKTIONEN ===
        function log(msg) {
            console.log(msg);
            const debugBox = document.getElementById('debug');
            debugBox.innerHTML += `<div>[LOG] ${msg}</div>`;
            debugBox.scrollTop = debugBox.scrollHeight;
        }

        function showMsg(text, type) {
            const box = document.getElementById('msgBox');
            box.textContent = text;
            box.className = 'status-msg ' + type;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 3000);
        }

        // === LEADERBOARD LADEN ===
        async function loadLeaderboard() {
            log('Lade Leaderboard...');
            const tbody = document.getElementById('lbBody');
            
            // Daten holen
            const { data, error } = await supabase
                .from('leaderboard')
                .select(`
                    *,
                    players ( username, display_name, region, role, is_banned )
                `)
                .order('points', { ascending: false });

            if (error) {
                log('Fehler beim Laden: ' + error.message);
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; color:red;">Fehler: ${error.message}</td></tr>`;
                return;
            }

            tbody.innerHTML = ''; // Tabelle leeren

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Keine Spieler gefunden.</td></tr>';
                return;
            }

            // Daten anzeigen
            data.forEach((row, index) => {
                if (row.players && row.players.is_banned) return; // Banned Spieler überspringen

                const rank = index + 1;
                let rankColor = '#64748b';
                if (rank === 1) rankColor = 'gold';
                if (rank === 2) rankColor = 'silver';
                if (rank === 3) rankColor = '#cd7f32';

                let tierClass = 'lp';
                if (row.tier.includes('HP')) tierClass = 'hp';
                if (row.tier === 'HP1') tierClass = 'hp1';

                const rowHTML = `
                    <tr>
                        <td style="color:${rankColor}; font-weight:bold;">#${rank}</td>
                        <td style="font-weight:bold;">${row.players ? row.players.display_name : 'Unbekannt'}</td>
                        <td>${row.players ? row.players.region : '-'}</td>
                        <td>${row.gamemode}</td>
                        <td style="color: #10b981;">${row.points}</td>
                        <td><span class="tier-badge ${tierClass}">${row.tier}</span></td>
                        <td style="font-size:12px; text-transform:uppercase;">${row.players ? row.players.role : '-'}</td>
                    </tr>
                `;
                tbody.innerHTML += rowHTML;
            });
            log('Leaderboard geladen: ' + data.length + ' Einträge');
        }

        // === AUTH (LOGIN / REGISTER) ===
        async function handleAuth() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(!user || !pass) {
                alert('Bitte Name und Passwort eingeben!');
                return;
            }

            log(isLoginMode ? 'Versuche Login...' : 'Versuche Registrierung...');

            // Supabase braucht Email, wir nehmen Usernamen@mcpower.local
            const email = user.toLowerCase() + '@mcpower.local';

            if (isLoginMode) {
                // LOGIN
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: pass
                });

                if (error) {
                    alert('Fehler: ' + error.message);
                    log('Login Fehler: ' + error.message);
                } else {
                    log('Login erfolgreich!');
                    currentUser = data.user;
                    closeModal();
                    checkSession();
                    document.getElementById('btnLogin').style.display = 'none';
                    document.getElementById('btnLogout').style.display = 'inline-block';
                    showMsg('Erfolgreich eingeloggt!', 'success');
                }
            } else {
                // REGISTER
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: pass
                });

                if (error) {
                    alert('Fehler: ' + error.message);
                } else {
                    log('Registrierung erfolgreich. Erstelle Spieler-Profil...');
                    // Profil in der "players" Tabelle anlegen
                    const { error: profileError } = await supabase.from('players').insert([
                        { user_id: data.user.id, username: user, display_name: user, role: 'player', region: 'DE' }
                    ]);
                    
                    if(profileError) log('Profil Fehler: ' + profileError.message);
                    
                    alert('Registriert! Bitte jetzt einloggen.');
                    isLoginMode = true;
                    updateModal();
                }
            }
        }

        async function checkSession() {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                currentUser = data.session.user;
                document.getElementById('btnLogin').style.display = 'none';
                document.getElementById('btnLogout').style.display = 'inline-block';
                log('Session erkannt.');
            }
        }

        // === UI STEUERUNG ===
        function updateModal() {
            document.getElementById('modalTitle').textContent = isLoginMode ? 'Anmelden' : 'Registrieren';
            document.getElementById('btnSubmit').textContent = isLoginMode ? 'Einloggen' : 'Registrieren';
            document.getElementById('toggleMode').textContent = isLoginMode ? 'Noch keinen Account? Registrieren' : 'Bereits Account? Einloggen';
        }

        function closeModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        // === EVENTS ===
        document.getElementById('btnLogin').onclick = () => {
            document.getElementById('loginModal').classList.add('active');
        };
        
        document.getElementById('btnLogout').onclick = async () => {
            await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('btnLogin').style.display = 'inline-block';
            document.getElementById('btnLogout').style.display = 'none';
            log('Abgemeldet.');
            location.reload();
        };

        document.getElementById('btnSubmit').onclick = handleAuth;
        document.getElementById('toggleMode').onclick = () => {
            isLoginMode = !isLoginMode;
            updateModal();
        };

        // Debug Konsole mit 'D' Taste
        document.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'd') {
                const dbg = document.getElementById('debug');
                dbg.style.display = dbg.style.display === 'none' ? 'block' : 'none';
            }
        });

        // START
        window.onload = () => {
            log('Seite geladen. Starte...');
            checkSession();
            loadLeaderboard();
        };

    </script>
</body>
</html>
