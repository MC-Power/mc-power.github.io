<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Power - Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151a24;
            --border: #2a3345;
            --primary: #00ff88;
            --danger: #ff4444;
            --gold: #ffd700;
            --text: #e0e6ed;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Header */
        header { background: var(--card); padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        nav button { background: none; border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; margin-left: 0.5rem; transition: 0.3s; }
        nav button:hover { background: var(--primary); color: #000; }

        /* Container */
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }

        /* Views */
        .view { display: none; }
        .view.active { display: block; }

        /* Leaderboard Table */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #1a2233; color: var(--primary); }
        tr:hover { background: #1f2738; }
        
        /* Tiers Colors */
        .tier { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.9rem; }
        .hp { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff88; }
        .lp { background: rgba(255, 68, 68, 0.2); color: #ff4444; border: 1px solid #ff4444; }
        .tier-HP1 { background: var(--gold); color: #000; border: 1px solid var(--gold); box-shadow: 0 0 10px var(--gold); }

        /* Forms */
        .form-box { max-width: 400px; margin: 2rem auto; background: var(--card); padding: 2rem; border-radius: 8px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 4px; }
        button.action-btn { width: 100%; padding: 1rem; background: var(--primary); color: #000; border: none; font-weight: bold; cursor: pointer; }
        
        /* Admin Panel */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .admin-card { background: var(--card); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border); }
        .role-badge { padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; text-transform: uppercase; }
        .role-owner { background: var(--gold); color: #000; }
        .role-cheater { background: var(--danger); color: #fff; }
        .role-banned { background: #333; color: #666; text-decoration: line-through; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 2rem; border-radius: 8px; width: 400px; }
    </style>
</head>
<body>

<header>
    <div class="logo"> MC Power</div>
    <nav id="nav-menu">
        <button onclick="showView('view-home')">Home</button>
        <button onclick="showView('view-auth')" id="btn-login">Login / Register</button>
        <button onclick="logout()" id="btn-logout" style="display:none;">Logout</button>
    </nav>
</header>

<div class="container">
    
    <!-- VIEW: Home / Leaderboard -->
    <div id="view-home" class="view active">
        <h1 style="border-bottom: 2px solid var(--primary); padding-bottom: 0.5rem; display: inline-block;">🏆 Top Leaderboard</h1>
        <div style="margin-top: 1rem;">
            <select id="filter-gamemode" onchange="loadLeaderboard()" style="width: auto; display: inline-block;">
                <option value="all">Alle Modi</option>
                <option value="1v1">1v1</option>
                <option value="FFA">FFA</option>
                <option value="UHC">UHC</option>
            </select>
        </div>
        <br>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Region</th>
                    <th>Modus</th>
                    <th>Punkte</th>
                    <th>Tier</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <!-- Daten laden -->
            </tbody>
        </table>
    </div>

    <!-- VIEW: Auth -->
    <div id="view-auth" class="view">
        <div class="form-box">
            <h2 style="text-align:center;">Account</h2>
            <input type="text" id="auth-user" placeholder="Username (Minecraft Name)">
            <input type="password" id="auth-pass" placeholder="Passwort">
            <button class="action-btn" onclick="handleAuth('login')">Login</button>
            <div style="text-align:center; margin-top: 1rem; cursor: pointer; color: var(--primary);" onclick="handleAuth('register')">
                Noch keinen Account? Registrieren
            </div>
        </div>
    </div>

    <!-- VIEW: Dashboard (Admin/Tester) -->
    <div id="view-dashboard" class="view">
        <h1>⚙️ Admin Dashboard</h1>
        <div class="admin-grid">
            
            <!-- Spieler Hinzufügen / Bearbeiten -->
            <div class="admin-card">
                <h3>➕ Spieler Verwalten</h3>
                <input type="text" id="adm-name" placeholder="Minecraft Name">
                <select id="adm-region">
                    <option value="EU">Europe</option>
                    <option value="NA">North America</option>
                    <option value="DE">Germany</option>
                </select>
                <select id="adm-gamemode">
                    <option value="1v1">1v1</option>
                    <option value="FFA">FFA</option>
                    <option value="UHC">UHC</option>
                </select>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="adm-points" placeholder="Punkte">
                    <select id="adm-tier">
                        <!-- JS generiert Tiers -->
                    </select>
                </div>
                <select id="adm-role">
                    <option value="player">Player</option>
                    <option value="tester">Tester</option>
                    <option value="co">Co-Admin</option>
                    <option value="admin">Admin</option>
                    <option value="owner">Owner</option>
                    <option value="cheater">⛔ Cheater</option>
                    <option value="banned">⛔ Banned</option>
                </select>
                <button class="action-btn" onclick="savePlayer()">Speichern / Updaten</button>
                <div id="adm-msg" style="color: var(--primary); margin-top: 10px;"></div>
            </div>

            <!-- Einstellungen -->
            <div class="admin-card">
                <h3>🔒 Einstellungen & Sicherheit</h3>
                <p style="color: #888; font-size: 0.9rem;">Hier kannst du dein Passwort ändern oder Spieler listen.</p>
                <input type="password" id="new-pass" placeholder="Neues Passwort">
                <button class="action-btn" onclick="changePassword()">Passwort ändern</button>
                <hr style="border-color: var(--border); margin: 1rem 0;">
                <h3>📋 Liste aller Spieler (DB)</h3>
                <div id="db-player-list" style="max-height: 200px; overflow-y: auto;">Lade...</div>
            </div>
        </div>
    </div>

</div>

<script>
    // KONFIGURATION
    const SUPABASE_URL = 'https://DEIN-PROJEKT.supabase.co'; // <-- HIER DEINE URL
    const SUPABASE_KEY = 'DEIN-ANON-KEY'; // <-- HIER DEIN KEY
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;
    let userRole = 'guest';

    // Tiers Generieren
    const tierSelect = document.getElementById('adm-tier');
    for(let i=10; i>=1; i--) {
        tierSelect.innerHTML += `<option value="LP${i}">LP${i} (Low Power)</option>`;
        tierSelect.innerHTML += `<option value="HP${i}">HP${i} (High Power)</option>`;
    }

    // Navigation
    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'view-home') loadLeaderboard();
    }

    // Auth Logic
    async function handleAuth(type) {
        const user = document.getElementById('auth-user').value;
        const pass = document.getElementById('auth-pass').value;
        
        if(type === 'register') {
            const { data, error } = await supabase.auth.signUp({
                email: user.toLowerCase() + '@mcpower.local', // Fake Email Hack
                password: pass
            });
            if(!error && data.user) {
                // Spieler anlegen
                await supabase.from('players').insert([{ user_id: data.user.id, username: user, role: 'player' }]);
                alert('Registrierung erfolgreich! Bitte einloggen.');
            } else { alert('Fehler: ' + error.message); }
        } else {
            const { data, error } = await supabase.auth.signInWithPassword({
                email: user.toLowerCase() + '@mcpower.local',
                password: pass
            });
            if(!error) {
                currentUser = data.user;
                document.getElementById('btn-login').style.display = 'none';
                document.getElementById('btn-logout').style.display = 'inline-block';
                showView('view-dashboard');
                loadAdminData();
            } else { alert('Login fehlgeschlagen!'); }
        }
    }

    async function logout() {
        await supabase.auth.signOut();
        location.reload();
    }

    // Check Session on Load
    async function checkSession() {
        const { data: { session } } = await supabase.auth.getSession();
        if(session) {
            currentUser = session.user;
            document.getElementById('btn-login').style.display = 'none';
            document.getElementById('btn-logout').style.display = 'inline-block';
            
            // Rolle holen
            const { data } = await supabase.from('players').select('role').eq('user_id', currentUser.id).single();
            userRole = data?.role || 'player';
            
            if(userRole !== 'player') showView('view-dashboard');
            else showView('view-home');
        }
    }
    checkSession();

    // Leaderboard Laden
    async function loadLeaderboard() {
        const mode = document.getElementById('filter-gamemode').value;
        let query = supabase.from('leaderboard').select('*, players(display_name, region, role, is_banned, is_cheater)').order('points', { ascending: false });
        
        if(mode !== 'all') query = query.eq('gamemode', mode);
        
        const { data } = await query;
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '';

        let rank = 1;
        data.forEach(row => {
            if(row.players.is_banned) return; // Banned nicht anzeigen

            const tierClass = row.tier.includes('HP') ? 'hp' : 'lp';
            const isCheater = row.players.is_cheater ? '<span style="color: red;">⚠️ Cheater</span>' : '';
            
            tbody.innerHTML += `
                <tr>
                    <td style="font-weight:bold; font-size: 1.2rem;">${rank}</td>
                    <td><strong>${row.players.display_name}</strong> ${isCheater}</td>
                    <td>${row.players.region}</td>
                    <td>${row.gamemode}</td>
                    <td>${row.points}</td>
                    <td><span class="tier tier-${row.tier} ${tierClass}">${row.tier}</span></td>
                    <td>${row.players.role.toUpperCase()}</td>
                </tr>
            `;
            rank++;
        });
    }

    // Admin Funktionen
    async function savePlayer() {
        const name = document.getElementById('adm-name').value;
        const region = document.getElementById('adm-region').value;
        const mode = document.getElementById('adm-gamemode').value;
        const points = document.getElementById('adm-points').value;
        const tier = document.getElementById('adm-tier').value;
        const role = document.getElementById('adm-role').value;

        if(!name) return alert("Name fehlt!");

        // Prüfen ob Spieler existiert, sonst anlegen
        let { data: player } = await supabase.from('players').select('id').eq('username', name).single();

        if(!player) {
            // Neuen Spieler anlegen
            const { data: newPlayer } = await supabase.from('players').insert([
                { username: name, display_name: name, region: region, role: role }
            ]).select().single();
            player = newPlayer;
        } else {
            // Update Rolle/Region
            await supabase.from('players').update({ region: region, role: role }).eq('id', player.id);
        }

        // Leaderboard Eintrag (Upsert)
        await supabase.from('leaderboard').upsert({
            player_id: player.id,
            gamemode: mode,
            points: parseInt(points),
            tier: tier
        }, { onConflict: 'player_id, gamemode' });

        document.getElementById('adm-msg').innerText = "Erfolgreich gespeichert!";
        setTimeout(() => document.getElementById('adm-msg').innerText = "", 2000);
        loadLeaderboard();
    }

    async function loadAdminData() {
        const { data } = await supabase.from('players').select('*').order('created_at', { ascending: false });
        const list = document.getElementById('db-player-list');
        list.innerHTML = '';
        data.forEach(p => {
            list.innerHTML += `<div style="padding: 5px; border-bottom: 1px solid #333; display:flex; justify-content:space-between;">
                <span>${p.display_name}</span> 
                <span class="role-badge role-${p.role}">${p.role}</span>
            </div>`;
        });
    }

    async function changePassword() {
        const newPass = document.getElementById('new-pass').value;
        if(!newPass) return;
        await supabase.auth.updateUser({ password: newPass });
        alert('Passwort geändert!');
    }

    // Initial Load
    loadLeaderboard();
</script>

</body>
</html>
