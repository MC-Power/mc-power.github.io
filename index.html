<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Power - Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151a24;
            --border: #2a3345;
            --primary: #00ff88;
            --danger: #ff4444;
            --gold: #ffd700;
            --text: #e0e6ed;
            --text-muted: #8892a6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.5;
        }
        
        header { 
            background: var(--card); 
            padding: 1rem 2rem; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        
        .btn { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 0.5rem 1.25rem; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: 500;
            transition: all 0.2s;
            margin-left: 0.5rem;
        }
        .btn:hover { background: var(--primary); color: #000; border-color: var(--primary); }
        .btn-primary { background: var(--primary); color: #000; border-color: var(--primary); }
        .btn-primary:hover { background: #00cc6a; }
        .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
        .btn-danger:hover { background: #cc0000; }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

        /* Debug Console */
        #debugConsole {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            border-top: 2px solid var(--primary);
            display: none;
            z-index: 1000;
        }
        #debugConsole.visible { display: block; }
        #toggleDebug {
            position: fixed;
            bottom: 5px;
            right: 5px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            z-index: 1001;
        }

        /* Leaderboard */
        .table-container { 
            background: var(--card); 
            border-radius: 10px; 
            overflow: hidden; 
            border: 1px solid var(--border);
            margin-top: 1rem;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem 1.25rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #1a2233; color: var(--primary); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; }
        tr:hover { background: #1f2738; }
        
        .rank { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 6px; font-weight: 700; }
        .rank-1 { background: var(--gold); color: #000; }
        .rank-2 { background: #c0c0c0; color: #000; }
        .rank-3 { background: #cd7f32; color: #000; }
        .rank-other { background: var(--border); color: var(--text-muted); }

        .tier { padding: 4px 10px; border-radius: 5px; font-weight: 600; font-size: 0.85rem; display: inline-block; min-width: 55px; text-align: center; }
        .tier.hp { background: rgba(0, 255, 136, 0.15); color: #00ff88; border: 1px solid #00ff88; }
        .tier.lp { background: rgba(255, 68, 68, 0.15); color: #ff6b6b; border: 1px solid #ff6b6b; }
        .tier.HP1 { background: var(--gold); color: #000; border-color: var(--gold); }

        .role-badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; font-weight: 600; }
        .role-owner { background: var(--gold); color: #000; }
        .role-admin { background: #6366f1; color: white; }
        .role-tester { background: #10b981; color: white; }
        .role-player { background: var(--border); color: var(--text-muted); }
        .role-cheater { background: var(--danger); color: white; }
        .role-banned { background: #333; color: #666; text-decoration: line-through; }

        /* Auth Modal */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); 
            justify-content: center; 
            align-items: center; 
            z-index: 500;
        }
        .modal.active { display: flex; }
        .modal-content { 
            background: var(--card); 
            padding: 2rem; 
            border-radius: 10px; 
            width: 90%; 
            max-width: 400px; 
            border: 1px solid var(--border);
        }
        .modal-title { text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .form-input { width: 100%; padding: 0.85rem; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; }
        .form-input:focus { outline: none; border-color: var(--primary); }
        
        .status-msg { padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; display: none; }
        .status-msg.success { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid #10b981; }
        .status-msg.error { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid #ef4444; }

        .loading { text-align: center; padding: 3rem; color: var(--text-muted); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="logo">MC Power</div>
    <div>
        <button class="btn" id="btnAuth">Anmelden</button>
        <button class="btn btn-danger hidden" id="btnLogout">Abmelden</button>
    </div>
</header>

<div class="container">
    <h1 style="border-bottom: 2px solid var(--primary); padding-bottom: 0.5rem; display: inline-block;">Leaderboard</h1>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width:60px;">Rang</th>
                    <th>Spieler</th>
                    <th>Region</th>
                    <th>Modus</th>
                    <th>Punkte</th>
                    <th>Tier</th>
                    <th>Rolle</th>
                </tr>
            </thead>
            <tbody id="lbBody">
                <tr><td colspan="7" class="loading">Verbinde mit Datenbank...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Auth Modal -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <h3 class="modal-title" id="authTitle">Anmelden</h3>
        <div id="authMsg" class="status-msg"></div>
        <div class="form-group">
            <label>Benutzername</label>
            <input type="text" id="inpUser" class="form-input" placeholder="Dein Name">
        </div>
        <div class="form-group">
            <label>Passwort</label>
            <input type="password" id="inpPass" class="form-input" placeholder="Mind. 6 Zeichen">
        </div>
        <button class="btn btn-primary" id="btnAuthSubmit" style="width:100%">Anmelden</button>
        <div style="text-align:center; margin-top:1rem; color:var(--text-muted); cursor:pointer;" id="authToggle">
            Noch kein Account? Registrieren
        </div>
        <div style="text-align:center; margin-top:0.5rem; cursor:pointer;" id="authClose">Schließen</div>
    </div>
</div>

<!-- Debug Console -->
<button id="toggleDebug">[D] Debug</button>
<div id="debugConsole"></div>

<script>
    // ===== KONFIGURATION =====
    const SUPABASE_URL = 'https://yqgtlfbykubjizqghiat.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxZ3RsZmJ5a3Viaml6cWdoaWF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNDQ0NzIsImV4cCI6MjA5MjcyMDQ3Mn0.qY9zREp-l_dpKJT1fnX6tiYKdsUwv0QNLezbUTkwTho';
    
    let supabase;
    let currentUser = null;
    let isLoginMode = true;

    // ===== DEBUG HELPER =====
    function log(msg, type='info') {
        const console = document.getElementById('debugConsole');
        const time = new Date().toLocaleTimeString();
        const color = type==='error'?'#f66':type==='success'?'#6f6':type==='warn'?'#ff6':'#0f0';
        console.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
        console.scrollTop = console.scrollHeight;
        console.log('[MC Power]', type.toUpperCase(), msg);
    }

    // ===== INIT =====
    window.addEventListener('DOMContentLoaded', async () => {
        log('Seite geladen, initialisiere...');
        
        try {
            if(typeof window.supabase === 'undefined') {
                throw new Error('Supabase Library nicht geladen!');
            }
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            log('Supabase Client erstellt', 'success');
            
            // Test-Connection
            const {  test, error: testErr } = await supabase.from('players').select('count', { count: 'exact', head: true });
            if(testErr) log('DB-Test: ' + testErr.message, 'warn');
            else log('DB-Verbindung OK', 'success');
            
        } catch(err) {
            log('INIT FEHLER: ' + err.message, 'error');
            document.getElementById('lbBody').innerHTML = `<tr><td colspan="7" style="color:var(--danger); text-align:center; padding:2rem;">Fehler: ${err.message}<br><small>Prüfe Konsole [D] für Details</small></td></tr>`;
            return;
        }

        // Event Listener binden
        bindEvents();
        
        // Session check
        await checkSession();
        
        // Leaderboard laden
        await loadLeaderboard();
        
        log('Initialisierung abgeschlossen', 'success');
    });

    function bindEvents() {
        // Auth Buttons
        document.getElementById('btnAuth').addEventListener('click', () => openAuth());
        document.getElementById('btnLogout').addEventListener('click', doLogout);
        document.getElementById('authClose').addEventListener('click', closeAuth);
        document.getElementById('authToggle').addEventListener('click', toggleAuthMode);
        document.getElementById('btnAuthSubmit').addEventListener('click', handleAuth);
        
        // Debug Toggle
        document.getElementById('toggleDebug').addEventListener('click', () => {
            document.getElementById('debugConsole').classList.toggle('visible');
        });
        
        // Keyboard shortcut D for debug
        document.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'd') {
                document.getElementById('debugConsole').classList.toggle('visible');
            }
        });
        
        log('Event Listener gebunden', 'success');
    }

    // ===== AUTH =====
    function openAuth() {
        document.getElementById('authModal').classList.add('active');
        document.getElementById('authMsg').style.display = 'none';
        log('Auth Modal geöffnet');
    }
    
    function closeAuth() {
        document.getElementById('authModal').classList.remove('active');
        log('Auth Modal geschlossen');
    }
    
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').textContent = isLoginMode ? 'Anmelden' : 'Registrieren';
        document.getElementById('btnAuthSubmit').textContent = isLoginMode ? 'Anmelden' : 'Registrieren';
        document.getElementById('authToggle').textContent = isLoginMode ? 'Noch kein Account? Registrieren' : 'Bereits Account? Anmelden';
        document.getElementById('authMsg').style.display = 'none';
        log('Auth Mode: ' + (isLoginMode?'LOGIN':'REGISTER'));
    }
    
    function showAuthMsg(text, isError) {
        const el = document.getElementById('authMsg');
        el.className = 'status-msg ' + (isError ? 'error' : 'success');
        el.style.display = 'block';
        el.textContent = text;
        log('Auth Msg: ' + text, isError?'error':'success');
    }

    async function handleAuth() {
        const username = document.getElementById('inpUser').value.trim();
        const password = document.getElementById('inpPass').value;
        
        log('Auth Versuch: ' + username);
        
        if(!username || !password) {
            showAuthMsg('Bitte Name und Passwort eingeben', true);
            return;
        }
        if(password.length < 6 && !isLoginMode) {
            showAuthMsg('Passwort mind. 6 Zeichen', true);
            return;
        }

        const email = username.toLowerCase() + '@mcpower.local';
        
        try {
            if(isLoginMode) {
                log('Login mit: ' + email);
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if(error) throw error;
                await onAuthSuccess(data.user);
                showAuthMsg('Erfolgreich eingeloggt!', false);
                setTimeout(closeAuth, 1000);
            } else {
                log('Register mit: ' + email);
                const { data, error } = await supabase.auth.signUp({ email, password });
                if(error) throw error;
                
                if(data.user) {
                    await supabase.from('players').insert([{
                        user_id: data.user.id,
                        username: username,
                        display_name: username,
                        role: 'player',
                        region: 'DE'
                    }]);
                    log('Spieler-Eintrag erstellt', 'success');
                }
                showAuthMsg('Registriert! Bitte einloggen.', false);
                isLoginMode = true;
                toggleAuthMode();
            }
        } catch(err) {
            log('Auth ERROR: ' + err.message, 'error');
            showAuthMsg(err.message || 'Fehler', true);
        }
    }

    async function onAuthSuccess(user) {
        currentUser = user;
        log('Auth Success: ' + user.email);
        
        document.getElementById('btnAuth').classList.add('hidden');
        document.getElementById('btnLogout').classList.remove('hidden');
        
        // Rolle laden
        try {
            const { data } = await supabase.from('players').select('role').eq('user_id', user.id).single();
            const role = data?.role || 'player';
            log('User Rolle: ' + role);
            
            if(['owner','admin','co','tester'].includes(role)) {
                log('Admin-Zugriff aktiviert');
                // Hier könnte Admin-Panel angezeigt werden
            }
        } catch(err) {
            log('Rolle laden Fehler: ' + err.message, 'warn');
        }
        
        await loadLeaderboard();
    }

    async function doLogout() {
        log('Logout');
        await supabase.auth.signOut();
        currentUser = null;
        document.getElementById('btnAuth').classList.remove('hidden');
        document.getElementById('btnLogout').classList.add('hidden');
        location.reload();
    }

    async function checkSession() {
        try {
            const {  { session } } = await supabase.auth.getSession();
            if(session?.user) {
                log('Session gefunden: ' + session.user.email);
                await onAuthSuccess(session.user);
            } else {
                log('Keine aktive Session');
            }
        } catch(err) {
            log('Session Check Error: ' + err.message, 'error');
        }
    }

    // ===== LEADERBOARD =====
    async function loadLeaderboard() {
        const tbody = document.getElementById('lbBody');
        tbody.innerHTML = '<tr><td colspan="7" class="loading">Lade Leaderboard...</td></tr>';
        log('Lade Leaderboard...');

        try {
            const { data, error } = await supabase
                .from('leaderboard')
                .select(`
                    *,
                    players (
                        id, username, display_name, region, role, is_cheater, is_banned
                    )
                `)
                .order('points', { ascending: false })
                .limit(100);

            if(error) throw error;
            log('Daten geladen: ' + (data?.length || 0) + ' Einträge', 'success');

            if(!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:2rem;">Noch keine Spieler eingetragen</td></tr>';
                return;
            }

            // Gruppiere nach Spieler
            const playerMap = new Map();
            data.forEach(entry => {
                const p = entry.players;
                if(!p || p.is_banned) return;
                if(!playerMap.has(p.id)) playerMap.set(p.id, { player: p, entries: [] });
                playerMap.get(p.id).entries.push(entry);
            });

            // Sortiere nach besten Punkten
            const sorted = Array.from(playerMap.values()).sort((a,b) => {
                const maxA = Math.max(...a.entries.map(e => e.points));
                const maxB = Math.max(...b.entries.map(e => e.points));
                return maxB - maxA;
            });

            tbody.innerHTML = sorted.map((item, idx) => {
                const p = item.player;
                const best = item.entries.reduce((max, e) => e.points > max.points ? e : max);
                const rankClass = idx < 3 ? `rank-${idx+1}` : 'rank-other';
                const tierClass = best.tier.includes('HP') ? 'hp' : 'lp';
                
                return `
                    <tr>
                        <td><span class="rank ${rankClass}">${idx+1}</span></td>
                        <td><strong>${p.display_name || p.username}</strong>${p.is_cheater?' <span style="color:var(--danger)">[!]</span>':''}</td>
                        <td>${p.region || '-'}</td>
                        <td>${best.gamemode}</td>
                        <td><strong>${best.points}</strong></td>
                        <td><span class="tier ${tierClass}">${best.tier}</span></td>
                        <td><span class="role-badge role-${p.role}">${p.role}</span></td>
                    </tr>
                `;
            }).join('');

        } catch(err) {
            log('Load ERROR: ' + err.message, 'error');
            tbody.innerHTML = `<tr><td colspan="7" style="color:var(--danger); text-align:center; padding:2rem;">Fehler: ${err.message}</td></tr>`;
        }
    }
</script>

</body>
</html>
