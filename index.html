<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Power - Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header>
    <div class="logo">⚔️ MC Power</div>
    <div>
        <button class="btn btn-primary" id="btnAuth">🔐 Anmelden</button>
        <button class="btn btn-danger hidden" id="btnLogout">🚪 Abmelden</button>
    </div>
</header>
<div class="container">
    <div id="connectionStatus" class="connection-status status-connecting"><span>Verbinde mit Datenbank...</span></div>
    <div id="statusBanner" class="status-banner"><span id="statusBannerIcon">ℹ️</span><span id="statusBannerText"></span></div>
    <h1 style="border-bottom: 3px solid var(--primary); padding-bottom: 0.75rem; display: inline-block; margin-bottom: 1.5rem;">🏆 Leaderboard</h1>
    <div class="table-wrapper">
        <div class="table-header"><span class="table-title">Top Spieler</span><span id="playerCount" style="color: var(--text-muted); font-size: 0.9rem;">Lade...</span></div>
        <table>
            <thead><tr><th style="width:70px;">Rang</th><th>Spieler</th><th style="width:100px;">Region</th><th style="width:120px;">Modus</th><th style="width:100px;">Punkte</th><th style="width:100px;">Tier</th><th style="width:100px;">Rolle</th></tr></thead>
            <tbody id="lbBody"><tr><td colspan="7"><div class="loading-container"><div class="spinner"></div><div class="loading-text">Verbinde mit Supabase...</div><div class="loading-sub">Bitte warten</div></div></td></tr></tbody>
        </table>
    </div>
</div>
<div id="authModal" class="modal">
    <div class="modal-content">
        <h3 class="modal-title" id="authTitle">🔐 Anmelden</h3>
        <div id="authMsg" class="status-msg"></div>
        <div class="form-group"><label for="inpUser">Benutzername</label><input type="text" id="inpUser" class="form-input" placeholder="Dein Minecraft Name" autocomplete="username"></div>
        <div class="form-group"><label for="inpPass">Passwort</label><input type="password" id="inpPass" class="form-input" placeholder="Mind. 6 Zeichen" autocomplete="current-password"></div>
        <button class="btn btn-primary" id="btnAuthSubmit" style="width:100%; padding: 1rem; font-size: 1.1rem;">Anmelden</button>
        <div class="auth-toggle" id="authToggle">Noch kein Account? <span style="color: var(--primary);">Jetzt registrieren</span></div>
        <div class="auth-close" id="authClose">❌ Abbrechen</div>
    </div>
</div>
<button id="toggleDebug" title="Debug Konsole öffnen/schließen (Taste: D)">🐛 Debug [D]</button>
<div id="debugConsole"></div>
<!-- Scripts laden - ALLE IM ROOT, KEINE ORDNER -->
<script src="config.js"></script>
<script src="supabase-client.js"></script>
<script src="auth.js"></script>
<script src="leaderboard.js"></script>
<script src="app.js"></script>
</body>
</html>
